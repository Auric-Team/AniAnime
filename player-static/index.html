<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Player - Megacloud Stream</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16/9;
        }
        video {
            width: 100%;
            height: 100%;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 100;
        }
        .error {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-size: 18px;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading Stream...</div>
    <div id="error" class="error" style="display: none;"></div>
    
    <div class="container">
        <video id="player" playsinline controls></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    
    <script>
        // Stream URL from Tatakai API (already decrypted)
        const STREAM_URL = 'https://haildrop77.pro/_v7/c81e0320ba619de237ee247b52d3bdb125d2e6f8f49bde94765ddd259c441a7b92faaefc4917c4cbabf53cd36a63cfbec26505f439fcd2525310c275b3d7942932d3fcd5136d9a931f75ab667445d747e83a25d5a0d2dc0b98cb173c2015d2a62fe269a51444cf298e96fd54102abaf736138682fa5dbdfbd4ff5712f296e2a3/master.m3u8';
        
        const video = document.querySelector('video');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        
        function showError(msg) {
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.innerHTML = `<h3>Error</h3><p>${msg}</p>`;
        }
        
        if (Hls.isSupported()) {
            const hls = new Hls({
                maxBufferLength: 30,
                maxMaxBufferLength: 60,
                enableWorker: true,
                xhrSetup: function(xhr, url) {
                    // Add Referer header for all requests
                    xhr.setRequestHeader('Referer', 'https://megacloud.blog/');
                }
            });
            
            hls.loadSource(STREAM_URL);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                loadingEl.style.display = 'none';
                const player = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
                    autoplay: true
                });
                video.play().catch(e => console.log('Autoplay prevented'));
            });
            
            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    console.error('HLS error:', data);
                    showError('Stream error: ' + data.type);
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Native HLS support (Safari)
            video.src = STREAM_URL;
            video.addEventListener('loadedmetadata', function() {
                loadingEl.style.display = 'none';
                const player = new Plyr(video);
                video.play().catch(e => console.log('Autoplay prevented'));
            });
        } else {
            showError('Your browser does not support HLS streaming');
        }
    </script>
</body>
</html>
